<!DOCTYPE html>
<html>
<head>
    <title>Activate VoiceNavigator</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 12px 24px; background: #0078d4; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Thank you for purchasing VoiceNavigator!</h2>
        <p>Click below to launch your desktop application and automatically generate your <strong>license.txt</strong> file.</p>
        
        <!-- This button triggers a local deep link back to your app -->
        <a id="activationLink" href="#" class="btn">Launch App to Activate</a>
    </div>

    <script>
        // Extract the token parameter from the URL query string
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('x-ms-marketplace-token');

        if (token) {
            // Pass the token seamlessly into your desktop app via a custom protocol
            document.getElementById('activationLink').href = `voicenavigator://activate?token=${token}`;
        } else {
            document.body.innerHTML = "<h3>Error: No activation token found. Please access this page directly from your Microsoft billing console.</h3>";
        }
    </script>
</body>
</html>
